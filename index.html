<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네일샵 리뷰 작성 도우미</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
    body { background: #FDF5F8; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem 4rem; }
    .container { background: #fff; border-radius: 20px; padding: 2rem 1.5rem; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(212,83,126,0.10); }

    .top-banner { background: #FBEAF0; border-radius: 14px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
    .banner-icon { width: 42px; height: 42px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .banner-title { font-size: 14px; font-weight: 700; color: #4B1528; margin-bottom: 3px; }
    .banner-sub { font-size: 12px; color: #993556; line-height: 1.5; }

    .step-block { margin-bottom: 1.5rem; }
    .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: #D4537E; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-title { font-size: 13px; font-weight: 600; color: #2a2a2a; }
    .step-hint { font-size: 11px; color: #bbb; margin-left: 2px; }

    .sub-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; color: #bbb; margin: 12px 0 8px; }

    .tag-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn { padding: 8px 16px; border-radius: 999px; border: 1.5px solid #e8e8e8; background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
    .tag-btn:hover:not(.selected) { border-color: #f4c0d1; color: #D4537E; }
    .tag-btn.selected { background: #FBEAF0; border-color: #D4537E; color: #4B1528; font-weight: 600; }

    .teacher-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .teacher-btn { padding: 13px 8px; border-radius: 12px; border: 1.5px solid #e8e8e8; background: #fff; color: #1a1a1a; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; line-height: 1.4; }
    .teacher-btn .role { display: block; font-size: 10px; color: #bbb; font-weight: 400; margin-top: 3px; }
    .teacher-btn.selected { background: #FBEAF0; border-color: #D4537E; color: #4B1528; }
    .teacher-btn.selected .role { color: #993556; }
    .teacher-btn:hover:not(.selected) { border-color: #f4c0d1; }

    .divider { height: 1px; background: #f5f5f5; margin: 1.5rem 0; }

    #generate-btn { width: 100%; padding: 15px; background: #D4537E; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
    #generate-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #generate-btn:hover:not(:disabled) { opacity: 0.88; }

    .review-card { background: #fff; border-radius: 14px; border: 1px solid #f0f0f0; padding: 1.25rem; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: border-color 0.15s; }
    .review-card:hover { border-color: #f4c0d1; }
    .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .review-num { font-size: 11px; font-weight: 600; color: #D4537E; background: #FBEAF0; padding: 3px 10px; border-radius: 999px; }
    .star { color: #F5A623; font-size: 13px; letter-spacing: 1px; }
    .copy-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fff; color: #888; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
    .copy-btn:hover { border-color: #D4537E; color: #D4537E; background: #FBEAF0; }
    .review-text { font-size: 14px; line-height: 1.85; color: #333; }

    .selected-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .selected-tag { font-size: 11px; background: #FBEAF0; color: #993556; padding: 3px 10px; border-radius: 999px; font-weight: 500; }

    .regen-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #e8e8e8; background: #fff; color: #999; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 4px; transition: all 0.15s; }
    .regen-btn:hover { border-color: #ccc; color: #555; }
    .naver-btn { display: block; width: 100%; padding: 14px; background: #03C75A; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; text-align: center; text-decoration: none; transition: opacity 0.15s; margin-top: 8px; }
    .naver-btn:hover { opacity: 0.88; }
    .naver-hint { font-size: 11px; color: #bbb; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>
<div class="container">

  <div class="top-banner">
    <div class="banner-icon">💅</div>
    <div>
      <div class="banner-title">리뷰 작성을 도와드릴게요</div>
      <div class="banner-sub">아래 항목을 선택하면<br>리뷰 문구 3개를 바로 만들어 드려요</div>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="step-block">
    <div class="step-header">
      <div class="step-num">1</div>
      <span class="step-title">관리 종류를 선택해 주세요</span>
      <span class="step-hint">복수 선택 가능</span>
    </div>
    <div class="tag-wrap">
      <button class="tag-btn" onclick="toggleTag(this,'service')">네일</button>
      <button class="tag-btn" onclick="toggleTag(this,'service')">페디</button>
    </div>
    <div class="sub-label">관리 내용</div>
    <div class="tag-wrap">
      <button class="tag-btn" onclick="toggleTag(this,'detail')">제거만</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">케어</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">투명젤</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">원톤</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">프렌치</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">글리터</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">그라데이션</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">자석</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">파우더</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">아트</button>
      <button class="tag-btn" onclick="toggleTag(this,'detail')">연장</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- STEP 2 -->
  <div class="step-block">
    <div class="step-header">
      <div class="step-num">2</div>
      <span class="step-title">담당 선생님을 선택해 주세요</span>
    </div>
    <div class="teacher-grid">
      <button class="teacher-btn" onclick="selectTeacher(this,'채윤점장님')">채윤점장님<span class="role">점장</span></button>
      <button class="teacher-btn" onclick="selectTeacher(this,'아린쌤')">아린쌤<span class="role">네일리스트</span></button>
      <button class="teacher-btn" onclick="selectTeacher(this,'지은쌤')">지은쌤<span class="role">네일리스트</span></button>
      <button class="teacher-btn" onclick="selectTeacher(this,'지윤쌤')">지윤쌤<span class="role">네일리스트</span></button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- STEP 3 -->
  <div class="step-block">
    <div class="step-header">
      <div class="step-num">3</div>
      <span class="step-title">만족스러웠던 점을 선택해 주세요</span>
      <span class="step-hint">복수 선택 가능</span>
    </div>
    <div class="tag-wrap">
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">디자인이 예뻐요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">섬세하고 정교해요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">재료가 엄청많아요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">오래 유지돼요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">친절하고 꼼꼼해요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">상담을 잘 해줘요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">빠르고 정확해요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">매장이 깔끔해요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">위생적이에요</button>
      <button class="tag-btn" onclick="toggleTag(this,'satisfy')">재방문 의사 있어요</button>
    </div>
  </div>

  <div class="divider"></div>

  <button id="generate-btn" onclick="showReviews()" disabled>
    💫 리뷰 문구 3개 보기
  </button>

  <div id="result-section" style="display:none; margin-top:1.5rem;">
    <div class="selected-tags" id="selected-summary"></div>
    <p style="font-size:11px;font-weight:600;letter-spacing:0.06em;color:#aaa;margin-bottom:12px;">마음에 드는 문구를 골라 복사하세요</p>
    <div id="cards"></div>
    <button class="regen-btn" onclick="showReviews()">🔄 다른 문구 3개 보기</button>
    <div class="divider"></div>
    <p style="font-size:11px;font-weight:600;letter-spacing:0.06em;color:#aaa;margin-bottom:8px;">복사 후 바로 리뷰 남기기</p>
    <a class="naver-btn" id="naver-link" href="http://m.place.naver.com/nailshop/2015725074/review/visitor" target="_blank">네이버 플레이스 리뷰 작성하러 가기 →</a>
    <p class="naver-hint">버튼을 누르면 네이버 플레이스로 이동해요</p>
  </div>

</div>

<script>
const selected = { service: new Set(), detail: new Set(), satisfy: new Set() };
let selectedTeacher = '';
let lastIndices = [];

const PERSONA_A = [
  '{teacher}께 {service} {detail} 받았는데 진짜 대박이에요!! 🩷 {satisfy} 이런 곳을 왜 이제야 알았을까요ㅠㅠ 앞으로 무조건 여기만 올 것 같아요!',
  '세상에 {detail} 이렇게 예쁘게 해주시는 분은 {teacher}밖에 없는 것 같아요🥹 {satisfy} 손 자꾸 들여다보게 되는 마법..✨',
  '{teacher}께 {service} {detail} 받았어요💅 {satisfy} 진짜 올 때마다 감동받고 가요ㅠㅠ 너무 예뻐서 사진만 100장 찍었어요!',
];

const PERSONA_B = [
  '{teacher}께 {service} {detail} 케어를 받았습니다. {satisfy} 시술 내내 꼼꼼하게 챙겨주셔서 신뢰가 갔고, 결과물도 기대 이상이었어요. 앞으로도 꾸준히 방문할 것 같습니다.',
  '위생과 관리 퀄리티를 꼼꼼히 따지는 편인데 {teacher}께 {service} {detail} 받고 완전히 만족했어요. {satisfy} 이런 곳이 진짜 단골 만드는 샵이라고 생각해요.',
  '{teacher}께 {service} {detail} 받았습니다. {satisfy} 기술도 기술이지만 고객 손톱 상태까지 세심하게 체크해 주셔서 더 믿음이 갔어요.',
];

const PERSONA_C = [
  '{teacher}께 {service} {detail} 받았어요. 상담부터 시술까지 빠르고 정확하게 진행해 주셔서 너무 좋았어요. {satisfy} 트렌드도 딱 잘 알고 계셔서 믿고 맡길 수 있었어요.',
  '{detail} 고민하다가 {teacher}께 맡겼는데 찰떡같이 알아듣고 원하는 스타일로 완성해 주셨어요. {satisfy} 시간도 효율적으로 쓰고 결과도 완벽했어요.',
  '{teacher}께 {service} {detail} 받았는데 요즘 트렌드 정말 잘 아시더라고요. {satisfy} 상담 시간도 짧았는데 제 취향을 완벽하게 파악하셨어요.',
];

const PERSONA_D = [
  '여러 네일샵을 다녀봤는데 {teacher}께 {service} {detail} 받고 드디어 단골 샵을 찾은 것 같아요. {satisfy} 이제 여기 말고는 못 갈 것 같아요.',
  '솔직히 네일샵 찾는 게 너무 힘들었는데 {teacher}께 {service} {detail} 받고 나서 바로 다음 예약 잡았어요. {satisfy} 진짜 오래 찾던 곳 드디어 찾은 느낌이에요.',
  '여기저기 다니다가 {teacher}를 만났는데 {service} {detail} 결과 보고 바로 단골 결정했어요. {satisfy} 더 이상 샵 탐방 안 해도 될 것 같아요.',
];

const ENDINGS = [
  "대구 교동 네일샵을 찾고 계신다면 예뻐질곧 교동점을 강력히 추천드립니다.",
  "네일 케어 고민이시라면 예뻐질곧 교동점에서 직접 경험해 보시길 권해드립니다.",
  "교동네일샵 예뻐질곧 교동점, 한 번 방문하시면 단골이 되실 거예요.",
  "대구네일샵 중에서도 예뻐질곧 교동점은 퀄리티와 서비스 모두 믿을 수 있는 곳입니다.",
  "꼼꼼하고 전문적인 케어를 원하신다면 예뻐질곧 교동점을 추천드립니다."
];

const satisfyMap = {
  '디자인이 예뻐요': '디자인이 너무 예뻐요.',
  '섬세하고 정교해요': '섬세하고 정교해요.',
  '재료가 엄청많아요': '재료 종류도 엄청 많아요.',
  '오래 유지돼요': '유지력도 정말 오래가요.',
  '친절하고 꼼꼼해요': '친절하고 꼼꼼해요.',
  '상담을 잘 해줘요': '상담도 잘 해줘요.',
  '빠르고 정확해요': '빠르고 정확해요.',
  '매장이 깔끔해요': '매장도 너무 깔끔해요.',
  '위생적이에요': '위생적으로 관리되어 있어요.',
  '재방문 의사 있어요': '또 방문하고 싶어요.',
};

function toggleTag(btn, cat) {
  const val = btn.textContent.trim();
  if (selected[cat].has(val)) { selected[cat].delete(val); btn.classList.remove('selected'); }
  else { selected[cat].add(val); btn.classList.add('selected'); }
  checkReady();
}

function selectTeacher(btn, name) {
  document.querySelectorAll('.teacher-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTeacher = name;
  lastIndices = [];
  checkReady();
}

function checkReady() {
  const hasContent = selected.service.size > 0 || selected.detail.size > 0 || selected.satisfy.size > 0;
  document.getElementById('generate-btn').disabled = !(selectedTeacher && hasContent);
}

function selectPersona() {
  const details = [...selected.detail];
  const satisfies = [...selected.satisfy];
  const isArt = details.some(d => ['아트', '글리터', '그라데이션', '파우더'].includes(d));
  const isCare = details.some(d => ['케어', '제거만', '투명젤'].includes(d)) ||
    satisfies.some(s => ['위생적이에요', '친절하고 꼼꼼해요', '오래 유지돼요'].includes(s));
  const isTrendy = details.some(d => ['자석', '파우더', '그라데이션'].includes(d)) ||
    satisfies.some(s => ['빠르고 정확해요', '상담을 잘 해줘요'].includes(s));
  if (isArt) return PERSONA_A;
  if (isCare) return PERSONA_B;
  if (isTrendy) return PERSONA_C;
  return PERSONA_D;
}

function buildReview() {
  const serviceText = [...selected.service].join(', ') || '네일';
  const detailText = [...selected.detail].join(', ') || serviceText;
  const satisfies = [...selected.satisfy];
  const satisfyText = satisfies.length > 0
    ? satisfies.map(s => satisfyMap[s] || s).join(' ')
    : '만족스러웠어요.';

  const persona = selectPersona();
  const template = persona[Math.floor(Math.random() * persona.length)];
  const ending = ENDINGS[Math.floor(Math.random() * ENDINGS.length)];

  return template
    .replace(/{teacher}/g, selectedTeacher)
    .replace(/{service}/g, serviceText)
    .replace(/{detail}/g, detailText)
    .replace(/{satisfy}/g, satisfyText)
    + ' ' + ending;
}

function showReviews() {
  const sec = document.getElementById('result-section');
  const cards = document.getElementById('cards');
  sec.style.display = 'block';

  const allTags = [selectedTeacher, ...selected.service, ...selected.detail, ...selected.satisfy];
  document.getElementById('selected-summary').innerHTML = allTags.map(t => `<span class="selected-tag">${t}</span>`).join('');

  cards.innerHTML = [0,1,2].map(idx => {
    const text = buildReview();
    return `
      <div class="review-card">
        <div class="review-header">
          <span class="review-num">리뷰 ${idx+1}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="star">★★★★★</span>
            <button class="copy-btn" onclick="copyReview(this,'rv${idx}')">📋 복사</button>
          </div>
        </div>
        <div class="review-text" id="rv${idx}">${text}</div>
      </div>`;
  }).join('');

  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyReview(btn, id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => { btn.textContent = '📋 복사'; }, 2000);
  });
}
</script>
</body>
</html>
